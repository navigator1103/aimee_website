<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — aimilabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0100fe;
    --black: #000000;
    --white: #ffffff;
    --grey-2: #f4f4f4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    background: var(--blue);
    color: var(--white);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ===== Top bar ===== */
  .page-head {
    padding: 28px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    z-index: 5;
  }
  .page-head .logo-top { line-height: 0; }
  .page-head .logo-top img { height: 22px; width: auto; display: block; }
  .page-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .page-nav a {
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(0,0,0,0.65);
    color: var(--white);
    font-size: 13px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.2s ease;
  }
  .page-nav a:hover { background: var(--white); color: var(--black); }
  .page-nav a.is-active { background: var(--white); color: var(--blue); }

  /* ===== Main ===== */
  main { flex: 1; padding: 60px 32px 100px; }
  .container { max-width: 1100px; margin: 0 auto; }

  .tag {
    display: inline-block;
    padding: 8px 22px;
    border-radius: 999px;
    border: 1.5px solid currentColor;
    font-size: clamp(14px, 1.1vw, 16px);
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-bottom: 48px;
    color: var(--white);
  }
  h1 {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(40px, 6vw, 80px);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 24px;
  }
  .lead {
    font-size: clamp(18px, 1.6vw, 22px);
    max-width: 580px;
    line-height: 1.45;
    opacity: 0.95;
    margin-bottom: 60px;
  }

  /* ===== Form ===== */
  .contact-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 80px;
    align-items: start;
  }
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .form-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-field label {
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.75;
    font-weight: 500;
  }
  .contact-form input,
  .contact-form textarea {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid rgba(255,255,255,0.4);
    padding: 12px 2px;
    font-size: 18px;
    font-family: inherit;
    color: var(--white);
    resize: none;
    width: 100%;
    transition: border-color 0.2s ease;
  }
  .contact-form input:focus,
  .contact-form textarea:focus {
    outline: none;
    border-bottom-color: var(--white);
  }
  .contact-form input::placeholder,
  .contact-form textarea::placeholder {
    color: rgba(255,255,255,0.4);
  }
  .submit-btn {
    align-self: flex-start;
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    background: var(--white);
    color: var(--blue);
    border: 1.5px solid var(--white);
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.2px;
    transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
  }
  .submit-btn:hover {
    background: transparent;
    color: var(--white);
    transform: translateY(-1px);
  }
  .submit-btn svg { width: 14px; height: 14px; }

  .form-status {
    margin-top: 16px;
    font-size: 14px;
    opacity: 0.9;
    min-height: 1.2em;
  }
  .form-status.is-success { color: #b8ffd2; }
  .form-status.is-error { color: #ffb8b8; }

  /* ===== Aside ===== */
  .contact-aside {
    display: flex;
    flex-direction: column;
    gap: 36px;
    padding-top: 8px;
  }
  .contact-aside .label {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.6;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .contact-aside .name { font-weight: 600; font-size: 18px; margin-bottom: 4px; }
  .contact-aside a { display: block; font-size: 16px; opacity: 0.95; transition: opacity 0.2s ease; }
  .contact-aside a:hover { opacity: 1; text-decoration: underline; }

  /* ===== Footer mark ===== */
  .contact-mark {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 30px;
    padding: 40px 32px;
  }
  .contact-mark .word { line-height: 0; }
  .contact-mark .word img {
    height: clamp(40px, 8vw, 110px);
    width: auto;
    max-width: 100%;
    display: block;
  }
  .a-mark { line-height: 0; flex-shrink: 0; }
  .a-mark img {
    height: clamp(32px, 5.5vw, 78px);
    width: auto;
    display: block;
  }

  @media (max-width: 820px) {
    .page-head { padding: 22px; }
    main { padding: 30px 22px 80px; }
    .contact-grid { grid-template-columns: 1fr; gap: 50px; }
    .contact-mark { padding: 30px 22px; }
    .lead { margin-bottom: 40px; }
  }
</style>
</head>
<body>

<header class="page-head">
  <a href="/" class="logo-top" aria-label="aimilabs"><img src="images/aimilabs-wordmark-white.png" alt="aimilabs" /></a>
  <nav class="page-nav">
    <a href="/#about">About</a>
    <a href="/#model">The Model</a>
    <a href="/#systems">Systems</a>
    <a href="/#studio">Studio</a>
    <a href="/#clients">Clients</a>
    <a href="/blog.html">Blog</a>
    <a href="/contact.html" class="is-active">Contact</a>
  </nav>
</header>

<main>
  <div class="container">
    <span class="tag">Contact</span>
    <h1>Let's build<br/>what's next.</h1>
    <p class="lead">Tell us what you're working on. We typically respond within one business day — usually faster.</p>

    <div class="contact-grid">
      <form class="contact-form" action="https://formspree.io/f/xaqvgrvv" method="POST" novalidate>
        <div class="form-field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@company.com" required />
        </div>
        <div class="form-field">
          <label for="company">Company</label>
          <input id="company" name="company" type="text" placeholder="Where you work" />
        </div>
        <div class="form-field">
          <label for="message">What are you building?</label>
          <textarea id="message" name="message" rows="5" placeholder="A sentence or two is plenty." required></textarea>
        </div>
        <input type="hidden" name="_subject" value="New aimilabs.com inquiry" />
        <button class="submit-btn" type="submit">
          Send message
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14"/>
            <path d="M12 5l7 7-7 7"/>
          </svg>
        </button>
        <div class="form-status" role="status" aria-live="polite"></div>
      </form>

      <aside class="contact-aside">
        <div>
          <div class="label">Direct</div>
          <div class="name">Tyler Yeom</div>
          <a href="mailto:tyler@aimilabs.com">tyler@aimilabs.com</a>
        </div>
        <div>
          <div class="label">Elsewhere</div>
          <a href="https://www.linkedin.com/company/aimilabs/" target="_blank" rel="noopener">LinkedIn</a>
          <a href="https://www.instagram.com/aimilabs?igsh=eW96cWdrMHp2YWY=" target="_blank" rel="noopener">Instagram</a>
          <a href="https://youtube.com/@aimilabs?si=qiKv2TiHDkyAcYuF" target="_blank" rel="noopener">YouTube</a>
        </div>
      </aside>
    </div>
  </div>
</main>

<footer>
  <div class="contact-mark">
    <div class="word"><img src="images/aimilabs-wordmark-white.png" alt="aimilabs" /></div>
    <div class="a-mark" aria-hidden="true"><img src="images/aimilabs-a-mark.png" alt="" /></div>
  </div>
</footer>

<script>
  (function() {
    var form = document.querySelector('.contact-form');
    var status = form.querySelector('.form-status');
    form.addEventListener('submit', function(e) {
      if (form.action.indexOf('REPLACE_WITH_YOUR_ENDPOINT') !== -1) {
        e.preventDefault();
        status.textContent = 'Form not yet wired — replace the Formspree endpoint in contact.html.';
        status.className = 'form-status is-error';
        return;
      }
      e.preventDefault();
      status.textContent = 'Sending…';
      status.className = 'form-status';
      var data = new FormData(form);
      fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
      .then(function(r) {
        if (r.ok) {
          form.reset();
          status.textContent = 'Thanks — we’ll be in touch shortly.';
          status.className = 'form-status is-success';
        } else {
          r.json().then(function(d) {
            status.textContent = (d.errors && d.errors.map(function(e){return e.message;}).join(', ')) || 'Something went wrong. Try again or email us directly.';
            status.className = 'form-status is-error';
          });
        }
      })
      .catch(function() {
        status.textContent = 'Network error. Try again or email us directly.';
        status.className = 'form-status is-error';
      });
    });
  })();
</script>

</body>
</html>
